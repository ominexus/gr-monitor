name: ETF Discrepancy Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# 모든 Job과 Step에 Node.js 24 강제 적용
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run ETF Monitor Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python etf_monitor.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f notified_disclosures.json ]; then
          git add notified_disclosures.json
          git commit -m "Update notified disclosures list [skip ci]" || echo "No changes to commit"
          git push
        fi
