name: ETF Discrepancy Monitor

on:
  schedule:
    # 한국 장(09:00~16:00) + 미국 장 시작(22:30~24:00) 통합 스케줄 (UTC 기준)
    # 한국 09:00 = UTC 00:00 / 한국 22:30 = UTC 13:30
    - cron: '*/10 0-7,13-15 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests yfinance

    - name: Run ETF Monitor Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python etf_monitor.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f notified_disclosures.json ]; then
          git add notified_disclosures.json
          git commit -m "Update notified disclosures list [skip ci]" || echo "No changes to commit"
          git push
        fi
